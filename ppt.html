<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=./display.html">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>메인 출력 화면으로 이동 중</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: #eaf3ed;
      color: #214b2d;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .card {
      width: min(92vw, 640px);
      padding: 32px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.88);
      border-top: 6px solid #2ea65a;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 3vw, 42px);
      color: #222;
    }

    p {
      margin: 0;
      font-size: clamp(16px, 1.5vw, 22px);
      line-height: 1.6;
      color: #444;
    }

    a {
      color: #1f7a3f;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>메인 출력 화면으로 이동합니다.</h1>
    <p>오프닝과 발표 송출은 이제 하나의 메인 출력 페이지에서 번갈아 표시됩니다.</p>
    <p style="margin-top: 12px;">
      자동으로 이동하지 않으면 <a href="./display.html">여기를 눌러 주세요</a>.
    </p>
  </div>
  <script>
    window.location.replace(new URL('./display.html', window.location.href).href);
  </script>
</body>
</html>
