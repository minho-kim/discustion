<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오프닝 PPT 전체 샘플</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --page-bg: #e6efe9;
      --page-bg-strong: #d7e6d4;
      --ink-strong: #1e2b23;
      --ink-soft: #415148;
      --line-soft: rgba(33, 75, 45, 0.12);
      --glass: rgba(255, 255, 255, 0.86);
      --brand: #2ea65a;
      --brand-deep: #214b2d;
      --shadow-lg: 0 24px 60px rgba(24, 39, 28, 0.12);
      --shadow-md: 0 18px 40px rgba(24, 39, 28, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0) 32%),
        linear-gradient(180deg, var(--page-bg) 0%, var(--page-bg-strong) 100%);
      color: var(--ink-strong);
    }

    body {
      padding: clamp(24px, 4vw, 48px);
    }

    .page-shell {
      width: min(1200px, 100%);
      margin: 0 auto;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      padding: 22px 24px;
      border: 1px solid var(--line-soft);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-md);
    }

    .hero-copy {
      max-width: 760px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(46, 166, 90, 0.12);
      color: var(--brand-deep);
      font-size: clamp(12px, 0.95vw, 16px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 14px 0 10px;
      font-size: clamp(34px, 3vw, 56px);
      line-height: 1.12;
      word-break: keep-all;
    }

    .hero p {
      margin: 0;
      color: var(--ink-soft);
      font-size: clamp(16px, 1.2vw, 20px);
      line-height: 1.7;
      word-break: keep-all;
    }

    .hero-meta {
      display: grid;
      gap: 10px;
      min-width: 180px;
    }

    .meta-card {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(245, 249, 246, 0.92);
      border: 1px solid rgba(46, 166, 90, 0.12);
      color: var(--ink-soft);
      text-align: right;
    }

    .meta-label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #668274;
    }

    .meta-value {
      font-size: clamp(18px, 1.45vw, 24px);
      font-weight: 900;
      color: var(--brand-deep);
    }

    .slides-grid {
      display: grid;
      gap: 32px;
      padding-bottom: 40px;
    }

    .slide-card {
      position: relative;
      overflow: hidden;
      min-height: min(76vh, 740px);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0.18));
      box-shadow: var(--shadow-lg);
      isolation: isolate;
    }

    .slide-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0.1)),
        linear-gradient(180deg, rgba(234, 243, 237, 0.96), rgba(223, 237, 226, 0.96));
      z-index: 0;
    }

    .slide-banner {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image: url('./banner.png');
      background-size: auto 100%;
      background-repeat: no-repeat;
      background-position: var(--banner-x, 0%) bottom;
      opacity: 0.92;
    }

    .slide-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0) 38%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
      z-index: 1;
    }

    .slide-shell {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      min-height: inherit;
      padding: clamp(28px, 4.5vw, 56px);
    }

    .slide-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .slide-brand {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(46, 166, 90, 0.16);
      color: var(--brand-deep);
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .slide-page {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: #51635a;
      font-size: clamp(14px, 1vw, 18px);
      font-weight: 700;
    }

    .slide-content {
      width: min(92%, 980px);
      padding: clamp(30px, 4vw, 56px);
      border-radius: 28px;
      background: var(--glass);
      border-top: 6px solid var(--brand);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 36px rgba(24, 39, 28, 0.08);
    }

    .slide-kicker {
      margin-bottom: 16px;
      color: #2d5e3a;
      font-size: clamp(12px, 0.9vw, 16px);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .slide-title {
      margin: 0;
      font-size: clamp(34px, 3vw, 64px);
      line-height: 1.18;
      word-break: keep-all;
      color: #1f261f;
    }

    .slide-body {
      margin: 22px 0 0;
      font-size: clamp(19px, 1.7vw, 30px);
      line-height: 1.72;
      color: #3b443d;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .slide-note {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid #d7dfd9;
      color: #5c6961;
      font-size: clamp(15px, 1.1vw, 21px);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    @media (max-width: 900px) {
      body {
        padding: 18px;
      }

      .hero {
        position: static;
        padding: 18px;
      }

      .hero-meta {
        width: 100%;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .meta-card {
        text-align: left;
      }

      .slide-card {
        min-height: auto;
      }

      .slide-shell {
        min-height: auto;
        padding: 18px;
      }

      .slide-content {
        width: 100%;
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <div class="hero-badge">Opening PPT Sample</div>
        <h1>오프닝 12장을 한 번에 보는 전체 샘플</h1>
        <p>
          실제 오프닝 송출에 들어가는 문구를 기준으로 각 장을 모두 펼쳐 두었습니다.
          이전처럼 첫 장만 보이는 느낌이 아니라, 한 페이지에서 전체 흐름을 바로 확인할 수 있습니다.
        </p>
      </div>
      <div class="hero-meta">
        <div class="meta-card">
          <span class="meta-label">총 슬라이드</span>
          <span class="meta-value">12장</span>
        </div>
        <div class="meta-card">
          <span class="meta-label">보기 방식</span>
          <span class="meta-value">전체 미리보기</span>
        </div>
      </div>
    </header>

    <main id="slidesGrid" class="slides-grid"></main>
  </div>

  <script>
    const slides = [
      {
        title: '용인시민 100인 연석회의',
        body: '미래의 풍요와 오늘의 삶을 함께 보듬는 용인을 위해\n시민의 지혜를 모으는 자리에 오신 것을 환영합니다.',
        note: ''
      },
      {
        title: '개회 선언',
        body: '지금부터 \'용인시민 100인 연석회의 공론장\'을 시작하겠습니다.',
        note: ''
      },
      {
        title: '환영 및 참가자 안내',
        body: '바쁘신 와중에도 함께해주신 시민 여러분, 진심으로 감사합니다.\n오늘 이 자리는 다양한 세대와 분야의 시민 100인이 모여\n용인의 현재와 미래를 함께 이야기하는 자리입니다.',
        note: ''
      },
      {
        title: '공론장 목적',
        body: '전문가가 아닌 시민이 직접 정책을 만드는 자리입니다.\n정답을 찾는 자리가 아니라, 서로의 경험과 생각을 모아\n실제 지방선거 후보자에게 제안할 \'시민 정책\'을 도출합니다.',
        note: ''
      },
      {
        title: '진행 방식 안내',
        body: '총 10개의 주제 테이블이 운영됩니다.\n자신이 관심 있고 직접 이야기 나누고 싶은 주제 테이블에서\n테이블별 퍼실리테이터의 안내에 따라 논의를 진행합니다.',
        note: '지역 불균형 / 돌봄 시스템 / 기후·에너지 / 맞춤형 일자리 / 주택·교통 / 시민참여 / 지역경제 등'
      },
      {
        title: '우리의 3가지 약속',
        body: '첫째. 서로의 의견을 존중합니다.\n둘째. 발언 기회를 공평하게 나눕니다.\n셋째. 비판보다는 제안을 중심으로 이야기합니다.',
        note: ''
      },
      {
        title: '테이블 논의 시작',
        body: '퍼실리테이터와 함께 구체적인 논의를 시작합니다.\n\n[입열기]\n나는 어떻게 이 자리에 참여하게 되었나요?\n생활, 일, 지역에서의 경험을 편하게 나누어 주세요.',
        note: ''
      },
      {
        title: '문제 드러내기 및 쟁점 정리',
        body: '개인의 경험과 불편함을 우리 모두의 문제로 확장합니다.\n유사한 의견을 묶고 점 스티커 투표를 통해\n가장 중요하고 시급하며 실현 가능한 우선순위 쟁점을 선택합니다.',
        note: ''
      },
      {
        title: '정책 아이디어 도출 및 정교화',
        body: '선택된 문제를 해결하기 위한 아이디어를 쏟아냅니다.\n평가하지 않기, 많이 내기, 자유롭게 말하기.\n도출된 아이디어를 현실적이고 설득력 있는 시민 정책으로 다듬습니다.',
        note: ''
      },
      {
        title: '전체 공유 및 발표',
        body: '각 테이블에서 논의된 핵심 쟁점과 정책 제안을 전체와 함께 나눕니다.\n여러분의 이야기가 어떻게 모였는지 확인해 보겠습니다.',
        note: ''
      },
      {
        title: '전체 기념 사진 촬영',
        body: '모든 발표가 마무리되었습니다.\n오늘의 소중한 자리를 기억하며, 참석해주신 100인의 시민 여러분과\n함께 기념 사진을 촬영하겠습니다.',
        note: ''
      },
      {
        title: '폐회 및 마무리',
        body: '긴 시간 함께해주신 시민 여러분, 진심으로 감사합니다.\n오늘 도출된 제안은 지방선거 후보자에게 소중히 전달하겠습니다.\n이상으로 용인시민 100인 연석회의를 모두 마치겠습니다.',
        note: ''
      }
    ];

    const slidesGrid = document.getElementById('slidesGrid');

    function createTextNode(tagName, className, value) {
      const node = document.createElement(tagName);
      node.className = className;
      node.innerText = value;
      return node;
    }

    function renderSlides() {
      slides.forEach(function (slide, index) {
        const section = document.createElement('section');
        section.className = 'slide-card';

        const progress = slides.length > 1
          ? (index / (slides.length - 1)) * 100
          : 0;
        section.style.setProperty('--banner-x', progress + '%');

        const banner = document.createElement('div');
        banner.className = 'slide-banner';
        section.appendChild(banner);

        const shell = document.createElement('div');
        shell.className = 'slide-shell';

        const top = document.createElement('div');
        top.className = 'slide-top';
        top.appendChild(createTextNode('div', 'slide-brand', '용인시민 100인 연석회의'));
        top.appendChild(createTextNode('div', 'slide-page', (index + 1) + ' / ' + slides.length));
        shell.appendChild(top);

        const content = document.createElement('div');
        content.className = 'slide-content';
        content.appendChild(createTextNode('div', 'slide-kicker', 'Opening Sequence'));

        const titleTag = index === 0 ? 'h1' : 'h2';
        content.appendChild(createTextNode(titleTag, 'slide-title', slide.title));
        content.appendChild(createTextNode('div', 'slide-body', slide.body));

        if (slide.note) {
          content.appendChild(createTextNode('div', 'slide-note', slide.note));
        }

        shell.appendChild(content);
        section.appendChild(shell);
        slidesGrid.appendChild(section);
      });
    }

    renderSlides();
  </script>
</body>
</html>
